apiVersion: v1
kind: Namespace
metadata:
  name: podmind
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: podmind
  namespace: podmind
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podmind-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
      - events
      - persistentvolumeclaims
      - namespaces
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: podmind-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: podmind-readonly
subjects:
  - kind: ServiceAccount
    name: podmind
    namespace: podmind
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podmind
  namespace: podmind
  labels:
    app: podmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podmind
  template:
    metadata:
      labels:
        app: podmind
    spec:
      serviceAccountName: podmind
      containers:
        - name: podmind
          image: podmind:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: PODMIND_MODE
              value: auto
            - name: PODMIND_PORT
              value: "8765"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: podmind
  namespace: podmind
spec:
  type: NodePort
  selector:
    app: podmind
  ports:
    - name: http
      port: 8765
      targetPort: http
      nodePort: 30876
